services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_URL: "https://newsletter.engajacomunicacao.com.br"
      APP_CRYPT_KEY: ""
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ""
      DB_USER: ""
      DB_PASS: ""
      TZ: America/Fortaleza
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USER: monitoramento@engajacomunicacao.com.br
      MAIL_PASS: ""
      MAIL_FROM_EMAIL: monitoramento@engajacomunicacao.com.br
      MAIL_FROM_NAME: "Engaja Comunicação"
    volumes:
      - engaja_uploads:/var/www/html/public/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ""
      DB_USER: ""
      DB_PASS: ""
      TZ: America/Fortaleza
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USER: monitoramento@engajacomunicacao.com.br
      MAIL_PASS: ""
      MAIL_FROM_EMAIL: monitoramento@engajacomunicacao.com.br
      MAIL_FROM_NAME: "Engaja Comunicação"
    volumes:
      - engaja_uploads:/var/www/html/public/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -lc "mkdir -p /var/www/html/storage &&
              touch /var/www/html/storage/cron.log &&
              while true; do
                php /var/www/html/cron/send_scheduled.php >> /var/www/html/storage/cron.log 2>&1;
                sleep 60;
              done"

  db:
    build:
      context: .
      dockerfile: Dockerfile.mysql
    environment:
      MYSQL_DATABASE: ""
      MYSQL_USER: ""
      MYSQL_PASSWORD: ""
      MYSQL_ROOT_PASSWORD: ""
      TZ: America/Sao_Paulo
    volumes:
      - engaja_dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    restart: unless-stopped

volumes:
  engaja_dbdata:
  engaja_uploads: