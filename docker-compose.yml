services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: engajaroot2024
      MYSQL_DATABASE: engaja
      MYSQL_USER: engaja
      MYSQL_PASSWORD: engajapass2024
    volumes:
      - engaja_mysql_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    image: gleidsonrocha/engaja-app:latest
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.web.loadbalancer.server.port=80"
    environment:
      APP_URL: "https://newsletter.engajacomunicacao.com.br"
      APP_CRYPT_KEY: ""
      DB_HOST: "db"
      DB_PORT: 3306
      DB_NAME: "engaja"
      DB_USER: "engaja"
      DB_PASS: "engajapass2024"
      TZ: America/Fortaleza
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USER: monitoramento@engajacomunicacao.com.br
      MAIL_PASS: ""
      MAIL_FROM_EMAIL: monitoramento@engajacomunicacao.com.br
      MAIL_FROM_NAME: "Engaja Comunicação"
    volumes:
      - engaja_uploads:/var/www/html/public/uploads
    restart: unless-stopped

  scheduler:
    image: gleidsonrocha/engaja-app:latest
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: "db"
      DB_PORT: 3306
      DB_NAME: "engaja"
      DB_USER: "engaja"
      DB_PASS: "engajapass2024"
      TZ: America/Fortaleza
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USER: monitoramento@engajacomunicacao.com.br
      MAIL_PASS: ""
      MAIL_FROM_EMAIL: monitoramento@engajacomunicacao.com.br
      MAIL_FROM_NAME: "Engaja Comunicação"
    volumes:
      - engaja_uploads:/var/www/html/public/uploads
    restart: unless-stopped
    command: >
      sh -lc "mkdir -p /var/www/html/storage &&
              touch /var/www/html/storage/cron.log &&
              while true; do
                php /var/www/html/cron/send_scheduled.php >> /var/www/html/storage/cron.log 2>&1;
                sleep 60;
              done"

volumes:
  engaja_uploads:
  engaja_mysql_data:
